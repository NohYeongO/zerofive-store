services:
  mysql:
    image: mysql:8.0
    container_name: zerofive-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zerofive_store
      MYSQL_USER: zerofive
      MYSQL_PASSWORD: zerofive
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zerofive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  issue-redis:
    image: redis:7-alpine
    container_name: zerofive-issue-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-init:
    image: redis:7-alpine
    container_name: zerofive-redis-init
    depends_on:
      redis:
        condition: service_healthy
      issue-redis:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Initializing Redis...' &&
        redis-cli -h redis SADD 'queue:active:events' '1' &&
        redis-cli -h redis SET 'event:1:threshold' '200' &&
        redis-cli -h issue-redis SET 'coupon:1:stock' '200' &&
        redis-cli -h issue-redis SADD 'queue:active:coupons' '1' &&
        echo 'Redis initialized!'
      "
    restart: "no"

  api:
    build: .
    container_name: zerofive-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/zerofive_store
      DB_USERNAME: zerofive
      DB_PASSWORD: zerofive
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      ISSUE_REDIS_HOST: issue-redis
      ISSUE_REDIS_PORT: 6379
      ISSUE_REDIS_USERNAME: ""
      ISSUE_REDIS_PASSWORD: ""
      JWT_SECRET: zerofive-test-secret-key-for-jwt-token-generation-12345
      JWT_EXPIRATION: 3600000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      issue-redis:
        condition: service_healthy
      redis-init:
        condition: service_completed_successfully

  influxdb:
    image: influxdb:1.8
    container_name: zerofive-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb-data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:10.2.0
    container_name: zerofive-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

  k6:
    image: grafana/k6:latest
    container_name: zerofive-k6
    volumes:
      - ./k6/scripts:/scripts
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
    depends_on:
      - api
      - influxdb
    profiles:
      - test

volumes:
  mysql-data:
  influxdb-data:
  grafana-data:
