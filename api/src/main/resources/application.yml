spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}

coupon:
  issue-redis:
    host: ${ISSUE_REDIS_HOST:${REDIS_HOST}}
    port: ${ISSUE_REDIS_PORT:${REDIS_PORT}}
    username: ${ISSUE_REDIS_USERNAME:${REDIS_USERNAME:}}
    password: ${ISSUE_REDIS_PASSWORD:${REDIS_PASSWORD:}}
  queue:
    heartbeat-timeout: 10
    default-threshold: 200
    scheduler-delay: 1000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
